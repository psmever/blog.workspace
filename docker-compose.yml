services:
  # === Laravel (Octane, 4000 포트) ===
  laravel:
    build:
      context: ./php
    environment:
      APP_ENV: local
      TZ: Asia/Seoul
    ports:
      - "4000:4000"
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - ../blog.backend:/var/www/html:cached
      - ${MY_BACKEND_ENV_FILE:-./../blog.backend/.env}:/var/www/html/.env:ro
    depends_on:
      mariadb:
        condition: service_healthy
    networks:
      - blognet

  # === Next.js (Dev Server, 3000 포트) ===
  nextjs:
    build:
      context: ../blog.frontend
      dockerfile: ../blog.docker/node/Dockerfile
    working_dir: /usr/src/app
    command: sh -lc "yarn install && yarn dev"
    environment:
      NODE_ENV: development
      PORT: "3000"
      NEXT_PUBLIC_API_BASE: "http://localhost:4000"
      TZ: Asia/Seoul
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - ../blog.frontend:/usr/src/app:cached
      - ${MY_FRONTEND_ENV_FILE:-./../blog.frontend/.env}:/usr/src/app/.env:ro
    ports:
      - "3000:3000"
    networks:
      - blognet

  # === MariaDB ===
  mariadb:
    image: mariadb:11
    environment:
      MARIADB_DATABASE: blog
      MARIADB_USER: blog
      MARIADB_PASSWORD: blogpass
      MARIADB_ROOT_PASSWORD: rootpass
      TZ: Asia/Seoul
    volumes:
      - dbdata:/var/lib/mysql
      - /etc/localtime:/etc/localtime:ro
    ports:
      - "13306:3306"
    networks:
      - blognet
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'mariadb-admin ping -h 127.0.0.1 -uroot -p"$${MARIADB_ROOT_PASSWORD}" --silent',
        ]
      interval: 5s
      timeout: 3s
      retries: 12

networks:
  blognet:
    driver: bridge

volumes:
  dbdata:
